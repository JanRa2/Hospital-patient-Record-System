<!DOCTYPE html>
<html>

<head>
    <title>Medical Reports</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="reports.html">Reports</a>
        <a href="upload.html">Upload Report</a>
        <a href="login.html">Login</a>
    </nav>

    <h1>Medical Reports</h1>

    <input type="text" id="searchBox" placeholder="Search reports..." onkeyup="searchReports()">

    <br><br>

    <table border="1">

        <tr>
            <th>Date</th>
            <th>Hospital</th>
            <th>Report</th>
        </tr>

        <tbody id="reportTable">
        </tbody>

    </table>

    <script>

        let reports =
            JSON.parse(localStorage.getItem("reports")) || [];

        function displayReports(filteredReports) {

            let tableRows = "";

            if (filteredReports.length === 0) {

                tableRows = `
            <tr>
                <td colspan="3">
                    No Reports Found
                </td>
            </tr>
        `;
            }
            else {

                filteredReports.forEach(function (report) {

                    tableRows += `
                <tr>
                    <td>${report.date}</td>
                    <td>${report.hospital}</td>
                    <td>${report.reportName}</td>
                </tr>
            `;

                });

            }

            document.getElementById("reportTable").innerHTML =
                tableRows;
        }

        function searchReports() {

            let searchText =
                document.getElementById("searchBox")
                    .value
                    .toLowerCase();

            let filteredReports =
                reports.filter(function (report) {

                    return report.reportName
                        .toLowerCase()
                        .includes(searchText);

                });

            displayReports(filteredReports);
        }

        displayReports(reports);

    </script>

</body>

</html>
