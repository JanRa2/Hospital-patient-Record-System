<!DOCTYPE html>
<html>

<head>
    <title>Patient Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="reports.html">Reports</a>
        <a href="upload.html">Upload Report</a>
        <a href="login.html">Login</a>
    </nav>

    <h1>Patient Profile</h1>

    <div id="patientProfile">
        Loading patient data...
    </div>

    <a href="reports.html">
        <button>View Reports</button>
    </a>

    <script>

        let patient = JSON.parse(localStorage.getItem("patient"));

        if (patient) {

            document.getElementById("patientProfile").innerHTML = `
        <h2>Patient Details</h2>

        <p><b>Name:</b> ${patient.name}</p>
        <p><b>Date of Birth:</b> ${patient.date}</p>
        <p><b>Allergies:</b> ${patient.allergies}</p>
        <p><b>Emergency Contact:</b> ${patient.contact}</p>
        <p><b>Email:</b> ${patient.email}</p>
        <p><b>Phone:</b> ${patient.phone}</p>
    `;
        }
        else {
            document.getElementById("patientProfile").innerHTML =
                "No patient data found.";
        }

    </script>

</body>

</html>
